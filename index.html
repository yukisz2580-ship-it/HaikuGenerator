<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俳句ジェネレーター</title>
    <link rel="stylesheet" href="style.css">
    <script src="haikuGenerator.js" defer></script>
</head>
<body>
    <h1 style="margin: auto;">"ここで一句"</h1>
    <p style="margin: auto;">再抽選を押すたびランダムな俳句が飛び出る！文学を気軽に愉しもう！</p>
    <div class="box">
        <div class="haikuGenerator-box">
            <i><h2 id="random-haiku-generator-textbox">
                デフォルトです<br>
                これが出てたら<br>
                エラーです
            </h2></i>
            <p style="text-align: right;">─詠み人知らず</p>
        </div>
        <input style="margin: auto; width: 100px; height: 30px;" type="button" id="reroll" value="再抽選">
    </div>
</body>
</html>
